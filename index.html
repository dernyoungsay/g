<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DERNYOUNGSAY</title>
    
    <link rel="icon" type="image/png" href="https://img2.pic.in.th/asdzx.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-glow: rgba(255, 255, 255, 0.15);
            --accent-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: default;
        }

        body {
            background-color: #000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
            position: relative;
        }

        /* --- Overlay --- */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 1.2s cubic-bezier(0.7, 0, 0.3, 1);
        }
        #overlay.fade-out { 
            opacity: 0; 
            visibility: hidden;
            transform: scale(1.1);
        }
        .enter-text {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 8px;
            animation: pulse 2s infinite;
            text-align: center;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.4; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } }

        /* --- Background Effect --- */
        .bg-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: url('https://img2.pic.in.th/imageb9605c3af49b68cd.png') center/cover no-repeat;
            filter: brightness(0.3) saturate(1.2);
            transform: scale(1.05);
            transition: transform 10s ease-out;
        }
        body.loaded .bg-wrapper { transform: scale(1); }

        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
        }

        /* --- Top Nav --- */
        .top-nav {
            position: fixed;
            top: 25px;
            width: 90%;
            max-width: 500px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            animation: slideDown 1s ease forwards;
        }
        @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .nav-logo img { width: 18px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
        .nav-text { font-family: 'Orbitron', sans-serif; font-size: 0.6rem; color: rgba(255,255,255,0.5); letter-spacing: 2px; }

        /* --- Main Content --- */
        .container {
            text-align: center;
            z-index: 10;
            width: 100%;
            padding: 0 30px;
            margin-top: 40px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 8vw, 4.5rem);
            font-weight: 700;
            letter-spacing: 15px;
            margin-bottom: 10px;
            background: linear-gradient(180deg, #fff 0%, #777 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
            animation: fadeIn 2s ease;
        }

        .subtext {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 5px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        .btn {
            position: relative;
            display: inline-flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 280px;
            height: 75px;
            text-decoration: none;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        .btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.4);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5), 0 0 20px rgba(255,255,255,0.1);
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }
        .btn:hover::before { left: 100%; }

        .btn-text-main { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; letter-spacing: 3px; font-weight: 700; color: #fff; }
        .btn-text-sub { font-size: 0.5rem; letter-spacing: 2px; color: rgba(255,255,255,0.3); margin-top: 5px; }

        /* --- Music Player --- */
        .music-player {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            align-items: center;
            z-index: 1000;
            transition: all 0.5s ease;
        }
        .album-art {
            width: 45px; height: 45px; border-radius: 12px;
            overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
            transition: transform 0.5s ease;
        }
        .playing .album-art { animation: pulseArt 2s infinite ease-in-out; }
        @keyframes pulseArt { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .album-art img { width: 100%; height: 100%; object-fit: cover; }
        
        .player-controls-mini { flex-grow: 1; margin-left: 15px; }
        .music-title-mini {
            font-size: 0.55rem; color: rgba(255,255,255,0.8);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            width: 150px; margin-bottom: 6px; font-family: 'Inter', sans-serif;
        }
        .ctrl-btns { display: flex; align-items: center; gap: 18px; }
        .play-btn { background: none; border: none; color: #fff; font-size: 0.8rem; cursor: pointer; opacity: 0.6; transition: 0.3s; }
        .play-btn:hover { opacity: 1; transform: scale(1.1); }

        footer {
            margin-top: 40px;
            font-size: 0.5rem;
            color: rgba(255,255,255,0.2);
            letter-spacing: 3px;
            font-family: 'Orbitron', sans-serif;
        }

        #youtube-player { display: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            h1 { letter-spacing: 8px; }
            .top-nav { width: 85%; }
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="startWebsite()">
        <div class="enter-text">
            <i class="fas fa-shield-halved" style="font-size: 1.5rem; margin-bottom: 20px; color: #fff; display: block;"></i>
            INITIALIZING SYSTEM<br>
            <span style="font-size: 0.5rem; opacity: 0.6; letter-spacing: 3px;">TAP TO ACCESS</span>
        </div>
    </div>

    <div class="bg-wrapper"></div>
    <div class="vignette"></div>

    <div class="top-nav">
        <a href="#" class="nav-logo">
            <img src="https://img2.pic.in.th/asdzx.png" alt="icon">
            DERNYOUNGSAY
        </a>
        <div class="nav-text">V.2026.1</div>
    </div>

    <div class="container">
        <h1>DERNYOUNGSAY</h1> 
        <div class="subtext">The Original Legacy Member</div>

        <div class="button-group">
            <a href="https://dernyoungsay.github.io/gg/" class="btn">
                <span class="btn-text-main">ENTER PORTAL</span>
                <span class="btn-text-sub">ENCRYPTED CONNECTION</span>
            </a>
        </div>

        <footer>
            &copy; 2026 ALL RIGHTS RESERVED
        </footer>
    </div>

    <div class="music-player" id="player-container">
        <div class="album-art">
            <img src="https://img.youtube.com/vi/Ovo1y7Pllt8/maxresdefault.jpg" alt="Cover" id="music-cover">
        </div>
        <div class="player-controls-mini">
            <div class="music-title-mini" id="music-title">Awaiting Data...</div>
            <div class="ctrl-btns">
                <i class="fas fa-step-backward play-btn"></i>
                <button class="play-btn" id="master-play"><i class="fas fa-play" id="play-icon"></i></button>
                <i class="fas fa-step-forward play-btn"></i>
            </div>
        </div>
    </div>

    <div id="youtube-player"></div>

    <script>
        // YouTube API Load
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        var videoId = 'Ovo1y7Pllt8'; 

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0', width: '0',
                videoId: videoId,
                playerVars: { 
                    'autoplay': 0, 
                    'loop': 1, 
                    'playlist': videoId,
                    'controls': 0,
                    'mute': 0,
                    'playsinline': 1 
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function startWebsite() {
            document.body.classList.add('loaded');
            const overlay = document.getElementById('overlay');
            overlay.classList.add('fade-out');
            
            if (player) {
                player.playVideo();
                player.unMute();
                player.setVolume(80);
            }
        }

        function onPlayerReady(event) {
            try {
                var title = player.getVideoData().title;
                document.getElementById('music-title').innerText = title || "Now Playing";
            } catch(e) {
                document.getElementById('music-title').innerText = "System Audio Active";
            }
        }

        function onPlayerStateChange(event) {
            const icon = document.getElementById('play-icon');
            const cont = document.getElementById('player-container');
            if (event.data == YT.PlayerState.PLAYING) {
                icon.className = 'fas fa-pause';
                cont.classList.add('playing');
            } else {
                icon.className = 'fas fa-play';
                cont.classList.remove('playing');
            }
        }

        document.getElementById('master-play').addEventListener('click', function() {
            if (player.getPlayerState() == YT.PlayerState.PLAYING) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        });

        // ป้องกันการคลิกขวา (Optional - เพื่อความเท่แบบ UI System)
        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>
</body>
</html>
