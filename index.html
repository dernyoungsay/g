<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DERNYOUNGSAY</title>
    
    <link rel="icon" type="image/png" href="https://img2.pic.in.th/asdzx.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400&family=Kanit:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --accent: #ffffff;
            --glass: rgba(0, 0, 0, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }

        body {
            background-color: #050505;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Smooth Background Layer */
        #bg-main {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            filter: brightness(0.4);
            z-index: -1;
            transition: background 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Entry Overlay */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        #overlay.hide { opacity: 0; visibility: hidden; }

        /* Ad Card (เหมือนในรูปตัวอย่าง) */
        #ad-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 9000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .ad-card {
            background: #111;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
            transform: scale(0.9);
            opacity: 0;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .ad-card.show { transform: scale(1); opacity: 1; }
        .ad-img-box { width: 100%; height: 210px; overflow: hidden; border-bottom: 2px solid #333; }
        .ad-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .ad-body { padding: 25px; text-align: center; }
        .ad-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 10px; font-family: 'Orbitron'; }
        .ad-desc { font-size: 0.9rem; color: #888; margin-bottom: 20px; line-height: 1.5; }
        .ad-btn {
            display: block; width: 100%; padding: 12px;
            background: #fff; color: #000; border-radius: 12px;
            text-decoration: none; font-weight: bold; transition: 0.3s;
        }
        .ad-btn:hover { background: #ccc; transform: translateY(-2px); }
        .close-ad { position: absolute; top: 15px; right: 15px; color: #fff; cursor: pointer; z-index: 10; font-size: 1.2rem; }

        /* Music Player UI */
        .music-player {
            position: fixed; bottom: 25px;
            width: 290px; padding: 10px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 18px;
            display: flex; align-items: center;
            z-index: 100;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .pos-left { left: 25px; }
        .pos-right { right: 25px; }
        
        .mu-cover { width: 48px; height: 48px; border-radius: 12px; overflow: hidden; flex-shrink: 0; }
        .mu-cover img { width: 100%; height: 100%; object-fit: cover; }
        .mu-info { margin-left: 12px; flex-grow: 1; overflow: hidden; }
        .mu-title { font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
        .mu-status { font-size: 0.6rem; color: #666; letter-spacing: 1px; }
        .mu-control { margin-left: 10px; cursor: pointer; color: #fff; opacity: 0.8; }

        /* Admin Trigger */
        #admin-trigger { position: fixed; top: 15px; right: 15px; opacity: 0.2; cursor: pointer; font-size: 0.7rem; z-index: 999; }

        /* SweetAlert Custom UI */
        .swal2-popup { background: #111 !important; color: #fff !important; border-radius: 20px !important; border: 1px solid #333 !important; }
        .swal2-input { background: #1a1a1a !important; color: #fff !important; border: 1px solid #333 !important; border-radius: 10px !important; }
        .swal2-confirm { background: #fff !important; color: #000 !important; border-radius: 10px !important; font-weight: bold !important; }
    </style>
</head>
<body>

    <div id="bg-main"></div>

    <div id="overlay" onclick="startApp()">
        <div style="text-align: center;">
            <i class="fas fa-fingerprint" style="font-size: 3rem; margin-bottom: 15px;"></i>
            <p style="font-family: 'Orbitron'; letter-spacing: 5px;">CLICK TO ENTER</p>
        </div>
    </div>

    <div id="ad-container">
        <div class="ad-card" id="ad-card">
            <div class="close-ad" onclick="closeAd()"><i class="fas fa-times"></i></div>
            <div class="ad-img-box"><img src="" id="db-ad-img"></div>
            <div class="ad-body">
                <div class="ad-title" id="db-ad-title">Loading...</div>
                <div class="ad-desc" id="db-ad-desc">...</div>
                <a href="" target="_blank" class="ad-btn" id="db-ad-link">GO TO POST</a>
            </div>
        </div>
    </div>

    <div id="admin-trigger" onclick="adminLogin()">ADMIN PANEL</div>

    <div class="music-player pos-right" id="main-player">
        <div class="mu-cover"><img src="" id="db-mu-cover"></div>
        <div class="mu-info">
            <div class="mu-title" id="db-mu-title">Loading Song...</div>
            <div class="mu-status">NOW PLAYING</div>
        </div>
        <div class="mu-control" onclick="togglePlay()"><i class="fas fa-pause" id="play-icon"></i></div>
    </div>

    <div id="yt-player" style="display:none"></div>

    <script>
        // Firebase Config
        const firebaseConfig = { databaseURL: "https://dysx-f978c-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let player;
        let isPlaying = false;

        // เชื่อมต่อ Realtime Database
        function listenData() {
            db.ref('website_settings').on('value', (snapshot) => {
                const data = snapshot.val();
                if(!data) return;

                // อัปเดตพื้นหลัง
                document.getElementById('bg-main').style.backgroundImage = `url('${data.bgUrl}')`;

                // อัปเดต Ad Banner
                document.getElementById('db-ad-img').src = data.adImg;
                document.getElementById('db-ad-title').innerText = data.adTitle;
                document.getElementById('db-ad-desc').innerText = data.adDesc;
                const adBtn = document.getElementById('db-ad-link');
                adBtn.innerText = data.adBtnText || "VIEW POST";
                adBtn.href = data.adLink;

                // อัปเดตตำแหน่งเพลง
                const pBox = document.getElementById('main-player');
                pBox.className = `music-player pos-${data.musicPos || 'right'}`;

                // อัปเดตเพลง (ถ้า ID เปลี่ยน)
                if(player && data.ytId) {
                    const currentId = player.getVideoData().video_id;
                    if(currentId !== data.ytId) {
                        player.loadVideoById(data.ytId);
                        updateMusicUI(data.ytId);
                    }
                }
            });
        }

        function updateMusicUI(id) {
            document.getElementById('db-mu-cover').src = `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
            setTimeout(() => {
                const title = player.getVideoData().title;
                document.getElementById('db-mu-title').innerText = title || "YouTube Music";
            }, 1000);
        }

        function startApp() {
            document.getElementById('overlay').classList.add('hide');
            document.getElementById('ad-container').style.display = 'flex';
            setTimeout(() => document.getElementById('ad-card').classList.add('show'), 100);
            if(player) player.playVideo();
        }

        function closeAd() {
            document.getElementById('ad-container').style.opacity = '0';
            setTimeout(() => document.getElementById('ad-container').style.display = 'none', 500);
        }

        function togglePlay() {
            const icon = document.getElementById('play-icon');
            if(isPlaying) {
                player.pauseVideo();
                icon.className = "fas fa-play";
            } else {
                player.playVideo();
                icon.className = "fas fa-pause";
            }
            isPlaying = !isPlaying;
        }

        // YouTube API
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0', width: '0', videoId: 'Ovo1y7Pllt8',
                playerVars: { 'autoplay': 0, 'controls': 0, 'playsinline': 1 },
                events: { 
                    'onReady': listenData,
                    'onStateChange': (e) => { isPlaying = (e.data == 1); }
                }
            });
        }

        // ระบบ Admin
        async function adminLogin() {
            const { value: pass } = await Swal.fire({
                title: 'ADMIN LOGIN',
                input: 'password',
                inputPlaceholder: 'ใส่รหัสผ่าน...',
                confirmButtonText: 'LOGIN'
            });

            if (pass === 'dys870') {
                showAdminPanel();
            } else if(pass) {
                Swal.fire('Error', 'รหัสผ่านไม่ถูกต้อง!', 'error');
            }
        }

        async function showAdminPanel() {
            const snap = await db.ref('website_settings').once('value');
            const d = snap.val() || {};

            const { value: formValues } = await Swal.fire({
                title: 'EDIT SYSTEM',
                html:
                    `<label style="font-size:0.7rem; color:#888;">YOUTUBE VIDEO ID</label>` +
                    `<input id="sw-yt" class="swal2-input" placeholder="ID หลัง v=" value="${d.ytId || ''}">` +
                    `<label style="font-size:0.7rem; color:#888;">AD IMAGE URL</label>` +
                    `<input id="sw-adImg" class="swal2-input" placeholder="URL รูปโฆษณา" value="${d.adImg || ''}">` +
                    `<label style="font-size:0.7rem; color:#888;">AD TITLE / DESC</label>` +
                    `<input id="sw-adTitle" class="swal2-input" placeholder="หัวข้อ" value="${d.adTitle || ''}">` +
                    `<input id="sw-adDesc" class="swal2-input" placeholder="รายละเอียด" value="${d.adDesc || ''}">` +
                    `<label style="font-size:0.7rem; color:#888;">BUTTON TEXT / LINK</label>` +
                    `<input id="sw-adBtn" class="swal2-input" placeholder="ข้อความบนปุ่ม" value="${d.adBtnText || ''}">` +
                    `<input id="sw-adLink" class="swal2-input" placeholder="ลิงก์ปุ่มโฆษณา" value="${d.adLink || ''}">` +
                    `<label style="font-size:0.7rem; color:#888;">BACKGROUND / MUSIC POS</label>` +
                    `<input id="sw-bg" class="swal2-input" placeholder="URL พื้นหลัง" value="${d.bgUrl || ''}">` +
                    `<input id="sw-pos" class="swal2-input" placeholder="left หรือ right" value="${d.musicPos || 'right'}">`,
                focusConfirm: false,
                confirmButtonText: 'SAVE SETTINGS',
                preConfirm: () => {
                    return {
                        ytId: document.getElementById('sw-yt').value,
                        adImg: document.getElementById('sw-adImg').value,
                        adTitle: document.getElementById('sw-adTitle').value,
                        adDesc: document.getElementById('sw-adDesc').value,
                        adBtnText: document.getElementById('sw-adBtn').value,
                        adLink: document.getElementById('sw-adLink').value,
                        bgUrl: document.getElementById('sw-bg').value,
                        musicPos: document.getElementById('sw-pos').value
                    }
                }
            });

            if (formValues) {
                db.ref('website_settings').update(formValues);
                Swal.fire({ icon: 'success', title: 'อัปเดตข้อมูลสำเร็จ!', showConfirmButton: false, timer: 1500 });
            }
        }

        // Load YouTube SDK
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
    </script>
</body>
</html>
