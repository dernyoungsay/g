<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DERNYOUNGSAY</title>
    
    <link rel="icon" type="image/png" href="https://img2.pic.in.th/asdzx.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400&family=Kanit:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --accent-color: #00d4ff;
            --glass-border: rgba(255, 255, 255, 0.15);
            --player-bg: rgba(10, 10, 10, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: default; }

        body {
            background-color: #000;
            color: #ffffff;
            font-family: 'Inter', 'Kanit', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
            position: relative;
        }

        /* --- ข้อความด้านบนสุด --- */
        .top-greeting {
            position: absolute;
            top: 15%;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            letter-spacing: 5px;
            color: var(--accent-color);
            text-shadow: 0 0 10px var(--accent-color);
            opacity: 0.8;
            animation: fadeInOut 3s infinite ease-in-out;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        /* --- ส่วนของชื่อหลัก (ไม่มีกรอบ) --- */
        .brand-container {
            position: relative;
            display: inline-block;
            padding: 20px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 12vw, 6rem);
            letter-spacing: 15px;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
            position: relative;
            z-index: 1;
            margin: 0;
            line-height: 1;
            /* ทำให้ฟอนต์ดู Smooth คลีน */
            font-weight: 700;
        }

        /* เอฟเฟกต์หยดน้ำที่ตัวอักษร */
        .text-droplets {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        /* --- เอฟเฟกต์บรรยากาศ --- */
        .wet-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 4; opacity: 0.5;
        }
        .droplet {
            position: absolute; background: rgba(255, 255, 255, 0.3);
            border-radius: 50%; filter: blur(1px);
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.2), 2px 2px 4px rgba(255,255,255,0.1);
        }

        .rain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; }
        .drop {
            position: absolute; background: rgba(255, 255, 255, 0.2);
            width: 1px; height: 50px; top: -100px;
            animation: fall 1.5s linear infinite;
        }
        @keyframes fall { to { transform: translateY(110vh); } }

        /* --- Overlay & UI --- */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: opacity 1.2s ease;
        }
        #overlay.fade-out { opacity: 0; visibility: hidden; }

        .container { text-align: center; z-index: 10; position: relative; }
        
        .subtext {
            font-family: 'Orbitron', sans-serif; font-size: 0.7rem; letter-spacing: 8px;
            color: rgba(255,255,255,0.3); margin-top: 20px; margin-bottom: 40px;
        }

        .btn {
            display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
            width: 280px; height: 70px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border); border-radius: 15px;
            backdrop-filter: blur(10px); text-decoration: none; transition: 0.4s; color: #fff;
        }
        .btn:hover { background: rgba(0, 212, 255, 0.1); border-color: var(--accent-color); transform: translateY(-5px); }

        /* Music Player */
        .music-player {
            position: fixed; bottom: 30px; right: 30px; width: 280px;
            background: var(--player-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 15px; padding: 10px;
            display: flex; align-items: center; z-index: 1000;
        }
        .album-art { width: 50px; height: 50px; border-radius: 10px; overflow: hidden; }
        .album-art img { width: 100%; height: 100%; object-fit: cover; }
        .playing img { animation: rotateDisk 10s linear infinite; }
        @keyframes rotateDisk { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #youtube-player { position: absolute; top: -1000px; }

        /* Splash Effect */
        .splash-particle {
            position: absolute; pointer-events: none;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(0,212,255,0.4) 100%);
            border-radius: 50%; z-index: 9999; animation: splashAnim 0.8s ease-out forwards;
        }
        @keyframes splashAnim {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1.5) translate(var(--tx), var(--ty)); opacity: 0; }
        }
    </style>
</head>
<body onclick="createSplash(event)">

    <div class="wet-screen" id="wet-screen"></div>

    <div id="overlay" onclick="startWebsite()">
        <i class="fa-solid fa-water" style="font-size: 3rem; color: var(--accent-color); margin-bottom: 20px; animation: pulse 2s infinite;"></i>
        <div style="font-family: 'Orbitron'; letter-spacing: 5px; color: #fff;">CLICK TO UNLOCK</div>
    </div>

    <div class="rain" id="rain"></div>

    <div class="top-greeting">HAPPY SONGKRAN DAY</div>

    <div class="container">
        <div class="brand-container">
            <h1>DERNYOUNGSAY</h1>
            <div class="text-droplets" id="text-droplets"></div>
        </div>
        
        <div class="subtext">THE ORIGINAL LEGACY MEMBER</div>
        
        <a href="https://dernyoungsay.github.io/gg/" class="btn">
            <span style="font-weight: bold; letter-spacing: 2px; font-size: 0.9rem;">MEMBER ENTER</span>
            <span style="font-size: 0.55rem; opacity: 0.5; margin-top: 5px;">Songkran Edition 2K26</span>
        </a>
    </div>

    <div class="music-player" id="player-container">
        <div class="album-art"><img src="https://img.youtube.com/vi/Ovo1y7Pllt8/maxresdefault.jpg" id="music-cover"></div>
        <div style="flex-grow: 1; margin-left: 12px; overflow: hidden;">
            <div id="music-title" style="font-size: 0.7rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #aaa;">Now Playing...</div>
            <button style="background:none; border:none; color:#fff; cursor:pointer; margin-top: 5px;" id="master-play">
                <i class="fas fa-play" id="play-icon"></i>
            </button>
        </div>
    </div>

    <div id="youtube-player"></div>

    <script>
        // สร้างหยดน้ำบนหน้าจอทั่วไป
        const wetScreen = document.getElementById('wet-screen');
        for(let i=0; i<30; i++) {
            const d = document.createElement('div');
            const size = Math.random() * 12 + 5;
            d.className = 'droplet';
            d.style.width = size + 'px';
            d.style.height = (size + Math.random() * 10) + 'px';
            d.style.left = Math.random() * 100 + 'vw';
            d.style.top = Math.random() * 100 + 'vh';
            wetScreen.appendChild(d);
        }

        // สร้างหยดน้ำที่ตัวอักษร DERNYOUNGSAY (ไหลลงตามแนวตัวอักษร)
        const textDroplets = document.getElementById('text-droplets');
        function createTextDroplet() {
            const d = document.createElement('div');
            const size = Math.random() * 6 + 2;
            d.className = 'droplet';
            d.style.width = size + 'px';
            d.style.height = (size + 5) + 'px';
            d.style.left = Math.random() * 95 + '%';
            d.style.top = '-10px';
            d.style.background = 'rgba(255,255,255,0.4)';
            d.style.transition = `top ${Math.random() * 2 + 2}s linear`;
            textDroplets.appendChild(d);
            
            setTimeout(() => {
                d.style.top = '110%';
            }, 100);
            
            setTimeout(() => d.remove(), 4000);
        }
        setInterval(createTextDroplet, 500);

        // ฝนตกพื้นหลัง
        const rain = document.getElementById('rain');
        for (let i = 0; i < 25; i++) {
            const dr = document.createElement('div');
            dr.className = 'drop';
            dr.style.left = Math.random() * 100 + 'vw';
            dr.style.animationDelay = Math.random() * 2 + 's';
            rain.appendChild(dr);
        }

        // เอฟเฟกต์สาดน้ำ
        function createSplash(e) {
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'splash-particle';
                p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
                p.style.width = p.style.height = Math.random() * 12 + 8 + 'px';
                p.style.setProperty('--tx', (Math.random()-0.5)*250+'px');
                p.style.setProperty('--ty', (Math.random()-0.5)*250+'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 800);
            }
        }

        // YouTube
        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0', width: '0', videoId: 'Ovo1y7Pllt8',
                playerVars: { 'autoplay': 0, 'loop': 1, 'playlist': 'Ovo1y7Pllt8' },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function startWebsite() {
            document.getElementById('overlay').classList.add('fade-out');
            if (player) { player.playVideo(); player.unMute(); }
        }

        function onPlayerStateChange(event) {
            const icon = document.getElementById('play-icon');
            const container = document.getElementById('player-container');
            if (event.data == YT.PlayerState.PLAYING) {
                icon.className = 'fas fa-pause';
                container.classList.add('playing');
            } else {
                icon.className = 'fas fa-play';
                container.classList.remove('playing');
            }
        }

        document.getElementById('master-play').addEventListener('click', (e) => {
            e.stopPropagation();
            if (player.getPlayerState() == YT.PlayerState.PLAYING) player.pauseVideo();
            else player.playVideo();
        });

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
