<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DERNYOUNGSAY</title>
    
    <link rel="icon" type="image/png" href="https://img2.pic.in.th/asdzx.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&family=Kanit:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --accent-color: #00d4ff;
            --glass-white: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --player-bg: rgba(15, 15, 15, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: default; }

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', 'Kanit', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
            position: relative;
        }

        /* --- Background Decoration --- */
        .bg-glow {
            position: absolute;
            width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.05) 0%, transparent 70%);
            z-index: 0; filter: blur(60px);
            pointer-events: none;
        }

        /* --- Top Greeting --- */
        .top-greeting {
            position: absolute;
            top: 12%;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 6px;
            color: var(--accent-color);
            text-transform: uppercase;
            opacity: 0.7;
            animation: floating 4s infinite ease-in-out;
            z-index: 5;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); opacity: 0.4; }
            50% { transform: translateY(-10px); opacity: 0.9; }
        }

        /* --- Brand UI (Smooth & Clean) --- */
        .container { text-align: center; z-index: 10; position: relative; }

        .brand-wrapper {
            position: relative;
            padding: 40px;
            transition: transform 0.3s ease;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 10vw, 5.5rem);
            letter-spacing: 18px;
            color: #ffffff;
            font-weight: 700;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1;
            margin: 0;
            line-height: 1;
        }

        .text-droplets {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2;
        }

        .subtext {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 10px;
            color: rgba(255,255,255,0.25);
            margin-top: 25px;
            margin-bottom: 45px;
            text-transform: uppercase;
        }

        /* --- Buttons --- */
        .btn {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 260px; height: 65px;
            background: var(--glass-white);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-color);
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 212, 255, 0.15);
        }

        /* --- Music Player UI (Smooth Redesign) --- */
        .music-player {
            position: fixed;
            bottom: 40px; right: 40px;
            width: 300px;
            background: var(--player-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: all 0.5s ease;
        }

        .album-art {
            width: 55px; height: 55px;
            border-radius: 14px;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
        }

        .album-art img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .playing .album-art img { animation: pulseArt 2s infinite ease-in-out; }

        @keyframes pulseArt {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .music-info {
            flex-grow: 1;
            margin-left: 15px;
            overflow: hidden;
        }

        .song-name {
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
            margin-bottom: 2px;
        }

        .artist-name {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
        }

        .play-btn {
            background: var(--accent-color);
            border: none;
            width: 32px; height: 32px;
            border-radius: 50%;
            color: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 10px;
            transition: 0.3s;
        }

        .play-btn:hover { transform: scale(1.1); filter: brightness(1.1); }

        /* --- Overlay --- */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #overlay.fade-out { opacity: 0; visibility: hidden; }

        /* --- Atmosphere --- */
        .wet-screen { position: fixed; inset: 0; pointer-events: none; z-index: 4; opacity: 0.4; }
        .droplet {
            position: absolute; background: rgba(255, 255, 255, 0.2);
            border-radius: 50%; filter: blur(0.5px);
            box-shadow: inset -1px -1px 2px rgba(0,0,0,0.1), 1px 1px 2px rgba(255,255,255,0.05);
        }
        .rain { position: fixed; inset: 0; z-index: 3; pointer-events: none; }
        .drop {
            position: absolute; background: linear-gradient(transparent, rgba(255,255,255,0.15));
            width: 1px; height: 60px; top: -100px;
            animation: fall 1.2s linear infinite;
        }
        @keyframes fall { to { transform: translateY(110vh); } }

        #youtube-player { position: absolute; visibility: hidden; }

        .splash-particle {
            position: absolute; pointer-events: none;
            background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, transparent 80%);
            border-radius: 50%; z-index: 9999; animation: splash 0.7s ease-out forwards;
        }
        @keyframes splash {
            0% { transform: scale(0); opacity: 0.8; }
            100% { transform: scale(2) translate(var(--tx), var(--ty)); opacity: 0; }
        }
    </style>
</head>
<body onclick="createSplash(event)">

    <div class="bg-glow"></div>
    <div class="wet-screen" id="wet-screen"></div>

    <div id="overlay" onclick="startWebsite()">
        <div style="position: relative;">
            <i class="fa-solid fa-droplet" style="font-size: 3.5rem; color: var(--accent-color); filter: drop-shadow(0 0 15px var(--accent-color));"></i>
        </div>
        <div style="font-family: 'Orbitron'; letter-spacing: 8px; color: #fff; margin-top: 30px; font-size: 0.7rem; opacity: 0.6;">ENTER THE EXPERIENCE</div>
    </div>

    <div class="rain" id="rain"></div>

    <div class="top-greeting">HAPPY SONGKRAN DAY</div>

    <div class="container">
        <div class="brand-wrapper">
            <h1>DERNYOUNGSAY</h1>
            <div class="text-droplets" id="text-droplets"></div>
        </div>
        
        <div class="subtext">The Original Legacy Member</div>
        
        <a href="https://dernyoungsay.github.io/gg/" class="btn">
            <span style="font-weight: 600; letter-spacing: 3px; font-size: 0.85rem;">MEMBER ENTER</span>
            <span style="font-size: 0.5rem; opacity: 0.4; margin-top: 6px; letter-spacing: 1px;">Songkran 2026 Special Edition</span>
        </a>
    </div>

    <div class="music-player" id="player-container">
        <div class="album-art">
            <img src="https://i.ytimg.com/vi/O90WsctfY4Y/maxresdefault.jpg" id="music-cover">
        </div>
        <div class="music-info">
            <div class="song-name">Sunset in Pattaya</div>
            <div class="artist-name">YOUNGOHM</div>
        </div>
        <button class="play-btn" id="master-play">
            <i class="fas fa-play" id="play-icon" style="margin-left: 2px;"></i>
        </button>
    </div>

    <div id="youtube-player"></div>

    <script>
        // Smooth Droplets on Screen
        const wetScreen = document.getElementById('wet-screen');
        for(let i=0; i<35; i++) {
            const d = document.createElement('div');
            const size = Math.random() * 10 + 4;
            d.className = 'droplet';
            d.style.width = size + 'px';
            d.style.height = (size + Math.random() * 12) + 'px';
            d.style.left = Math.random() * 100 + 'vw';
            d.style.top = Math.random() * 100 + 'vh';
            d.style.opacity = Math.random() * 0.5 + 0.2;
            wetScreen.appendChild(d);
        }

        // Text Water Flow Effect
        const textDroplets = document.getElementById('text-droplets');
        function createTextFlow() {
            const d = document.createElement('div');
            const size = Math.random() * 5 + 2;
            d.className = 'droplet';
            d.style.width = size + 'px';
            d.style.height = (size + 8) + 'px';
            d.style.left = (Math.random() * 90 + 5) + '%';
            d.style.top = '-10%';
            d.style.background = 'rgba(255,255,255,0.3)';
            d.style.transition = `top ${Math.random() * 1.5 + 2.5}s cubic-bezier(0.4, 0, 0.6, 1)`;
            textDroplets.appendChild(d);
            
            setTimeout(() => { d.style.top = '110%'; }, 50);
            setTimeout(() => d.remove(), 4000);
        }
        setInterval(createTextFlow, 400);

        // Ambient Rain
        const rain = document.getElementById('rain');
        for (let i = 0; i < 20; i++) {
            const dr = document.createElement('div');
            dr.className = 'drop';
            dr.style.left = Math.random() * 100 + 'vw';
            dr.style.animationDelay = Math.random() * 2 + 's';
            dr.style.animationDuration = (Math.random() * 0.5 + 1) + 's';
            rain.appendChild(dr);
        }

        // Water Splash on Click
        function createSplash(e) {
            for (let i = 0; i < 10; i++) {
                const p = document.createElement('div');
                p.className = 'splash-particle';
                p.style.left = e.clientX + 'px';
                p.style.top = e.clientY + 'px';
                const size = Math.random() * 10 + 5;
                p.style.width = p.style.height = size + 'px';
                p.style.setProperty('--tx', (Math.random()-0.5)*200+'px');
                p.style.setProperty('--ty', (Math.random()-0.5)*200+'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 700);
            }
        }

        // YouTube API Integration
        var player;
        const videoID = 'O90WsctfY4Y'; // Sunset in Pattaya

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0', width: '0', videoId: videoID,
                playerVars: { 
                    'autoplay': 0, 
                    'loop': 1, 
                    'playlist': videoID,
                    'controls': 0,
                    'showinfo': 0,
                    'rel': 0
                },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function startWebsite() {
            document.getElementById('overlay').classList.add('fade-out');
            if (player) { 
                player.playVideo(); 
                player.unMute();
                player.setVolume(80);
            }
        }

        function onPlayerStateChange(event) {
            const icon = document.getElementById('play-icon');
            const container = document.getElementById('player-container');
            if (event.data == YT.PlayerState.PLAYING) {
                icon.className = 'fas fa-pause';
                icon.style.marginLeft = '0';
                container.classList.add('playing');
            } else {
                icon.className = 'fas fa-play';
                icon.style.marginLeft = '2px';
                container.classList.remove('playing');
            }
        }

        document.getElementById('master-play').addEventListener('click', (e) => {
            e.stopPropagation();
            const state = player.getPlayerState();
            if (state == YT.PlayerState.PLAYING) player.pauseVideo();
            else player.playVideo();
        });

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);
        
        // Prevent right click for clean look
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
