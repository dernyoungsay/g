<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DERNYOUNGSAY - PREMIUM</title>
    
    <link rel="icon" type="image/png" href="https://img2.pic.in.th/asdzx.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400&family=Kanit:wght@300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --primary-color: #ffffff;
            --accent-color: #ff0000;
            --bg-overlay: rgba(0, 0, 0, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Inter', 'Kanit', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.5s ease;
        }

        /* Background Layer */
        #bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://img2.pic.in.th/imageb9605c3af49b68cd.png') center/cover no-repeat;
            filter: brightness(0.4);
            z-index: -2;
            transition: background 1s ease;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        /* Smooth UI Elements */
        .fade-in { animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Overlay */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #overlay.hide { opacity: 0; pointer-events: none; }

        /* Ad Modal (Custom UI like requested) */
        #ad-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            z-index: 999;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .ad-content {
            background: #111;
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .ad-img { width: 100%; height: 200px; object-fit: cover; border-bottom: 2px solid var(--accent-color); }
        .ad-body { padding: 25px; text-align: center; }
        .ad-title { font-family: 'Orbitron'; font-size: 1.2rem; margin-bottom: 10px; color: #fff; }
        .ad-desc { font-size: 0.9rem; color: #aaa; margin-bottom: 20px; line-height: 1.5; }
        .ad-btn {
            display: inline-block;
            background: #fff; color: #000;
            padding: 12px 30px; border-radius: 10px;
            text-decoration: none; font-weight: bold; font-size: 0.8rem;
            transition: 0.3s; width: 100%;
        }
        .ad-btn:hover { background: #ddd; }
        .close-ad { position: absolute; top: 15px; right: 15px; color: #fff; cursor: pointer; font-size: 1.2rem; z-index: 10; }

        /* Music Player Positioning */
        .music-player {
            position: fixed;
            bottom: 25px;
            width: 280px;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            padding: 10px 15px;
            z-index: 100;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .pos-left { left: 20px; }
        .pos-right { right: 20px; }
        
        .album-art {
            width: 45px; height: 45px; border-radius: 12px;
            overflow: hidden; flex-shrink: 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .album-art img { width: 100%; height: 100%; object-fit: cover; }
        .player-info { flex-grow: 1; margin: 0 12px; overflow: hidden; }
        .music-title { font-size: 0.7rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
        .music-controls { display: flex; gap: 12px; font-size: 0.8rem; }
        .music-controls i { cursor: pointer; opacity: 0.7; transition: 0.2s; }
        .music-controls i:hover { opacity: 1; color: var(--accent-color); }

        /* Main Content */
        .top-nav {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            border-radius: 50px; padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center; z-index: 90;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .container { text-align: center; padding-top: 150px; }
        h1 { font-family: 'Orbitron'; font-size: 3rem; letter-spacing: 10px; margin-bottom: 10px; }
        
        /* Admin Button */
        #admin-trigger {
            position: fixed; top: 20px; right: 20px; font-size: 0.7rem; opacity: 0.3; cursor: pointer;
        }

        /* Custom SweetAlert Style */
        .my-swal-popup {
            background: #111 !important;
            border: 1px solid #333 !important;
            border-radius: 20px !important;
            color: #fff !important;
            font-family: 'Kanit', sans-serif !important;
        }
        .my-swal-confirm { background: #fff !important; color: #000 !important; border-radius: 10px !important; }
        .my-swal-input { background: #222 !important; color: #fff !important; border: 1px solid #444 !important; }

        #youtube-player { display: none; }
    </style>
</head>
<body>

    <div id="bg-layer"></div>

    <div id="overlay" onclick="initPage()">
        <div style="text-align: center;">
            <i class="fas fa-fingerprint fade-in" style="font-size: 3rem; margin-bottom: 20px;"></i>
            <div class="fade-in" style="font-family: 'Orbitron'; letter-spacing: 5px;">CLICK TO ACCESS</div>
        </div>
    </div>

    <div id="ad-modal">
        <div class="ad-content animate__animated animate__zoomIn">
            <i class="fas fa-times close-ad" onclick="closeAd()"></i>
            <img src="" alt="Ad" class="ad-img" id="db-ad-img">
            <div class="ad-body">
                <h2 class="ad-title" id="db-ad-title">Loading...</h2>
                <p class="ad-desc" id="db-ad-desc">...</p>
                <a href="#" target="_blank" class="ad-btn" id="db-ad-link">GO TO POST</a>
            </div>
        </div>
    </div>

    <div class="top-nav">
        <div style="font-family: 'Orbitron'; font-size: 0.7rem;"><i class="fas fa-shield-alt"></i> DERNYOUNGSAY</div>
        <div style="font-size: 0.6rem; color: #888;">PREMIUM v2.0</div>
    </div>

    <div class="container">
        <h1 class="fade-in">588 STYLE</h1>
        <p class="fade-in" style="color: #666; letter-spacing: 3px; font-size: 0.8rem;">SYSTEM BY ADMIN</p>
    </div>

    <div class="music-player pos-right" id="main-player">
        <div class="album-art">
            <img src="" id="db-mu-cover" alt="Art">
        </div>
        <div class="player-info">
            <div class="music-title" id="db-mu-title">Loading Music...</div>
            <div class="music-controls">
                <i class="fas fa-step-backward"></i>
                <i class="fas fa-play" id="play-trigger" onclick="togglePlay()"></i>
                <i class="fas fa-step-forward"></i>
            </div>
        </div>
    </div>

    <div id="admin-trigger" onclick="loginAdmin()">ADMIN</div>
    <div id="youtube-player"></div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            databaseURL: "https://dysx-f978c-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let player;
        let isPlaying = false;

        // Initialize Data from Firebase
        function listenData() {
            db.ref('settings').on('value', (snapshot) => {
                const data = snapshot.val();
                if(!data) return;

                // Update Ad
                document.getElementById('db-ad-img').src = data.adImg;
                document.getElementById('db-ad-title').innerText = data.adTitle;
                document.getElementById('db-ad-desc').innerText = data.adDesc;
                const adBtn = document.getElementById('db-ad-link');
                adBtn.innerText = data.adBtnText || "VIEW POST";
                adBtn.href = data.adLink;

                // Update Background
                document.getElementById('bg-layer').style.backgroundImage = `url('${data.bgUrl}')`;

                // Update Music Position
                const playerEl = document.getElementById('main-player');
                playerEl.className = `music-player pos-${data.musicPos || 'right'}`;

                // Update Song
                if (player && data.songId) {
                    const currentId = player.getVideoData().video_id;
                    if(currentId !== data.songId) {
                        player.loadVideoById(data.songId);
                        updateMusicUI(data.songId);
                    }
                }
            });
        }

        // YouTube API
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0', width: '0',
                videoId: 'Ovo1y7Pllt8',
                playerVars: { 'autoplay': 0, 'controls': 0, 'playsinline': 1 },
                events: {
                    'onReady': () => { listenData(); },
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function updateMusicUI(id) {
            document.getElementById('db-mu-cover').src = `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
            // Fetch title via oEmbed or wait for player
            setTimeout(() => {
                const title = player.getVideoData().title;
                document.getElementById('db-mu-title').innerText = title || "Now Playing";
            }, 1000);
        }

        function onPlayerStateChange(event) {
            const icon = document.getElementById('play-trigger');
            if (event.data == YT.PlayerState.PLAYING) {
                icon.className = 'fas fa-pause';
                isPlaying = true;
            } else {
                icon.className = 'fas fa-play';
                isPlaying = false;
            }
        }

        function togglePlay() {
            if (isPlaying) player.pauseVideo();
            else player.playVideo();
        }

        function initPage() {
            document.getElementById('overlay').classList.add('hide');
            document.getElementById('ad-modal').style.display = 'flex';
            if(player) {
                player.playVideo();
                player.setVolume(50);
            }
        }

        function closeAd() {
            document.getElementById('ad-modal').style.display = 'none';
        }

        // Admin System
        async function loginAdmin() {
            const { value: password } = await Swal.fire({
                title: 'ADMIN LOGIN',
                input: 'password',
                inputPlaceholder: 'Enter Password',
                customClass: { popup: 'my-swal-popup', confirmButton: 'my-swal-confirm', input: 'my-swal-input' }
            });

            if (password === 'dys870') {
                showAdminPanel();
            } else if (password) {
                Swal.fire({ icon: 'error', title: 'Wrong Password', customClass: { popup: 'my-swal-popup' } });
            }
        }

        async function showAdminPanel() {
            const snapshot = await db.ref('settings').once('value');
            const d = snapshot.val();

            const { value: formValues } = await Swal.fire({
                title: 'EDIT SYSTEM',
                html:
                    `<label>YouTube ID</label><input id="sw-songId" class="swal2-input" value="${d.songId}">` +
                    `<label>Ad Image URL</label><input id="sw-adImg" class="swal2-input" value="${d.adImg}">` +
                    `<label>Ad Title</label><input id="sw-adTitle" class="swal2-input" value="${d.adTitle}">` +
                    `<label>Ad Link</label><input id="sw-adLink" class="swal2-input" value="${d.adLink}">` +
                    `<label>Background URL</label><input id="sw-bg" class="swal2-input" value="${d.bgUrl}">` +
                    `<label>Music Pos (left/right)</label><input id="sw-pos" class="swal2-input" value="${d.musicPos}">`,
                focusConfirm: false,
                customClass: { popup: 'my-swal-popup', confirmButton: 'my-swal-confirm' },
                preConfirm: () => {
                    return {
                        songId: document.getElementById('sw-songId').value,
                        adImg: document.getElementById('sw-adImg').value,
                        adTitle: document.getElementById('sw-adTitle').value,
                        adLink: document.getElementById('sw-adLink').value,
                        bgUrl: document.getElementById('sw-bg').value,
                        musicPos: document.getElementById('sw-pos').value
                    }
                }
            });

            if (formValues) {
                db.ref('settings').update(formValues);
                Swal.fire({ title: 'Updated!', icon: 'success', timer: 1500, showConfirmButton: false });
            }
        }

        // Load YT SDK
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
    </script>
</body>
</html>
