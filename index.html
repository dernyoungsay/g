<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DERNYOUNGSAY</title>
    
    <link rel="icon" type="image/png" href="https://img2.pic.in.th/asdzx.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden; /* ป้องกันการเลื่อนซ้ายขวา */
            position: relative;
            padding: 20px 0;
        }

        /* --- Overlay สำหรับกดเข้าเว็บ --- */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.8s ease;
        }
        #overlay.fade-out { opacity: 0; pointer-events: none; }
        .enter-text {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 5px;
            animation: pulse 1.5s infinite;
            text-align: center;
            padding: 0 20px;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* --- พื้นหลังรูปภาพ --- */
        body::before {
            content: "";
            position: fixed; /* ใช้ fixed เพื่อให้ภาพนิ่งเวลาเลื่อน */
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://img2.pic.in.th/imageb9605c3af49b68cd.png') center/cover no-repeat;
            filter: brightness(0.4);
            z-index: -1;
        }

        /* --- แถบบน (Top Navigation) --- */
        .top-nav {
            position: fixed;
            top: 15px;
            width: 90%;
            max-width: 600px; /* ลดความกว้างสูงสุดบน PC เพื่อความมินิมอล */
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        .nav-logo {
            background: #fff;
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.65rem;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        .nav-logo img { width: 14px; height: 14px; }
        .nav-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.8);
        }

        .container { 
            text-align: center; 
            z-index: 1; 
            width: 100%; 
            padding: 0 20px;
            margin-top: 60px; /* เผื่อที่ให้ top-nav */
            margin-bottom: 100px; /* เผื่อที่ให้ music player */
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 10vw, 4rem); 
            letter-spacing: clamp(4px, 2vw, 12px);
            margin-bottom: 15px; 
            text-transform: uppercase;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #888, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: floatText 4s ease-in-out infinite, shine 5s linear infinite;
        }

        .subtext {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.5rem, 3vw, 0.7rem);
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 40px;
            text-transform: uppercase;
            line-height: 1.6;
        }

        @keyframes floatText { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes shine { to { background-position: 200% center; } }

        .button-group { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 20px;
        }

        .btn {
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            width: 100%;
            max-width: 320px; 
            height: 80px; 
            font-family: 'Orbitron', sans-serif;
            color: #ffffff;
            text-decoration: none; 
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; 
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .btn:active { transform: scale(0.95); }
        .btn-text-main { font-size: 1rem; letter-spacing: 3px; font-weight: 700; }
        .btn-text-sub {
            font-size: 0.5rem;
            letter-spacing: 2px;
            margin-top: 4px;
            color: rgba(255, 255, 255, 0.4);
        }

        /* --- Music Player (ปรับปรุงให้รองรับมือถือ) --- */
        .music-player {
            position: fixed; 
            bottom: 25px; 
            left: 50%;
            transform: translateX(-50%); /* จัดกลางหน้าจอ */
            width: 90%;
            max-width: 300px;
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            display: flex; 
            align-items: center;
            padding: 10px 15px;
            z-index: 100;
        }
        .album-art {
            width: 45px; height: 45px; border-radius: 50%;
            overflow: hidden; border: 2px solid rgba(255,255,255,0.2);
            flex-shrink: 0;
            animation: rotateArt 12s linear infinite;
            animation-play-state: paused;
        }
        .playing .album-art { animation-play-state: running; }
        @keyframes rotateArt { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .album-art img { width: 100%; height: 100%; object-fit: cover; }
        
        .player-controls-mini { flex-grow: 1; margin-left: 12px; overflow: hidden; }
        .music-title-mini {
            font-size: 0.55rem; font-weight: 400;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            color: rgba(255,255,255,0.9);
            margin-bottom: 5px;
        }
        .ctrl-btns { display: flex; align-items: center; gap: 15px; }
        .play-btn { background: none; border: none; color: white; font-size: 0.8rem; cursor: pointer; opacity: 0.8; }

        #youtube-player { display: none; }

        footer {
            position: relative; 
            margin-top: 20px;
            font-size: 0.55rem; 
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 2px; 
            text-transform: uppercase;
            padding-bottom: 120px; /* ดัน footer ขึ้นจาก player */
        }

        /* สำหรับมือถือขนาดเล็กมาก */
        @media (max-width: 360px) {
            h1 { font-size: 1.5rem; }
            .btn { height: 70px; }
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="startWebsite()">
        <div class="enter-text">
            <i class="fas fa-fingerprint" style="font-size: 2rem; margin-bottom: 10px; display: block;"></i>
            CLICK TO ENTER
        </div>
    </div>

    <div class="top-nav">
        <a href="#" class="nav-logo">
            <img src="https://img2.pic.in.th/asdzx.png" alt="icon">
            DERNYOUNGSAY
        </a>
        <div class="nav-text">MEMBER 2K26</div>
    </div>

    <div class="container">
        <h1>DERNYOUNGSAY</h1> 
        <div class="subtext">MEMBER DERNYOUNGSAY ORIGINAL</div>

        <div class="button-group">
            <a href="https://dernyoungsay.github.io/gg/" class="btn">
                <span class="btn-text-main">ENTER MEMBER</span>
                <span class="btn-text-sub">ACCESS GRANTED</span>
            </a>
        </div>

        <footer>
            © 2026 DERNYOUNGSAY
        </footer>
    </div>

    <div class="music-player" id="player-container">
        <div class="album-art">
            <img src="https://img.youtube.com/vi/Ovo1y7Pllt8/maxresdefault.jpg" alt="Cover" id="music-cover">
        </div>
        <div class="player-controls-mini">
            <div class="music-title-mini" id="music-title">Loading...</div>
            <div class="ctrl-btns">
                <i class="fas fa-backward play-btn"></i>
                <button class="play-btn" id="master-play"><i class="fas fa-play" id="play-icon"></i></button>
                <i class="fas fa-forward play-btn"></i>
            </div>
        </div>
    </div>

    <div id="youtube-player"></div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        var videoId = 'Ovo1y7Pllt8'; 

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0', width: '0',
                videoId: videoId,
                playerVars: { 
                    'autoplay': 0, 
                    'loop': 1, 
                    'playlist': videoId,
                    'controls': 0,
                    'mute': 0,
                    'playsinline': 1 // สำคัญมากเพื่อให้เล่นบนมือถือได้โดยไม่เด้งเต็มจอ
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function startWebsite() {
            document.getElementById('overlay').classList.add('fade-out');
            if (player) {
                player.playVideo();
                player.unMute();
                player.setVolume(100);
            }
        }

        function onPlayerReady(event) {
            try {
                var title = player.getVideoData().title;
                document.getElementById('music-title').innerText = title || "Now Playing";
            } catch(e) {
                document.getElementById('music-title').innerText = "Music Playing";
            }
        }

        function onPlayerStateChange(event) {
            const icon = document.getElementById('play-icon');
            const cont = document.getElementById('player-container');
            if (event.data == YT.PlayerState.PLAYING) {
                icon.className = 'fas fa-pause';
                cont.classList.add('playing');
            } else {
                icon.className = 'fas fa-play';
                cont.classList.remove('playing');
            }
        }

        document.getElementById('master-play').addEventListener('click', function() {
            if (player.getPlayerState() == YT.PlayerState.PLAYING) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        });
    </script>
</body>
</html>
