<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DERNYOUNGSAY</title>
    
    <link rel="icon" type="image/png" href="https://img2.pic.in.th/asdzx.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400&family=Kanit:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            /* ปรับโทนสีเป็นสีฟ้าน้ำสงกรานต์ */
            --primary-glow: rgba(0, 212, 255, 0.3);
            --accent-color: #00d4ff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(0, 212, 255, 0.2);
            --songkran-blue: #0093E9;
            --songkran-cyan: #80D0C7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: default;
        }

        body {
            background-color: #020b1a; /* พื้นหลังน้ำเงินเข้ม */
            color: #ffffff;
            font-family: 'Inter', 'Kanit', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
            position: relative;
        }

        /* --- Overlay --- */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #020b1a 0%, #000 100%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 1.2s cubic-bezier(0.7, 0, 0.3, 1), visibility 1.2s;
        }
        
        #overlay.fade-out { 
            opacity: 0; 
            visibility: hidden;
        }

        .enter-text-wrapper {
            text-align: center;
            font-family: 'Orbitron', sans-serif;
        }

        .water-drop-icon {
            font-size: 4rem;
            color: var(--accent-color);
            margin-bottom: 25px;
            filter: drop-shadow(0 0 15px rgba(0, 212, 255, 0.5));
            animation: ripple 2s infinite ease-in-out;
            cursor: pointer;
        }

        @keyframes ripple {
            0% { transform: scale(1); filter: drop-shadow(0 0 10px var(--accent-color)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 30px var(--accent-color)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 10px var(--accent-color)); }
        }

        .main-enter-text {
            font-size: 1.2rem;
            letter-spacing: 12px; 
            color: #ffffff;
            margin-bottom: 10px;
            font-weight: 400;
        }

        .sub-enter-text {
            font-size: 0.6rem;
            letter-spacing: 5px;
            color: var(--accent-color);
            opacity: 0.7;
            font-weight: 300;
        }

        /* --- Background --- */
        .bg-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            /* พื้นหลังรูปภาพที่เกี่ยวกับสงกรานต์หรือโทนน้ำ */
            background: url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat;
            filter: brightness(0.4) saturate(1.5) blur(2px);
            transform: scale(1.1);
            transition: transform 10s ease-out;
        }
        body.loaded .bg-wrapper { transform: scale(1); }

        /* เอฟเฟกต์ละอองน้ำ (Overlay) */
        .water-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(0,147,233,0.1) 0%, rgba(128,208,199,0.1) 100%);
            pointer-events: none;
            z-index: 1;
        }

        /* --- Nav --- */
        .top-nav {
            position: fixed;
            top: 25px;
            width: 90%;
            max-width: 500px;
            background: rgba(0, 212, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 1s ease 0.5s;
        }
        body.loaded .top-nav { opacity: 1; transform: translateY(0); }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .nav-logo img { width: 18px; filter: drop-shadow(0 0 5px var(--accent-color)); }
        .nav-text { font-family: 'Orbitron', sans-serif; font-size: 0.6rem; color: var(--accent-color); letter-spacing: 2px; }

        /* --- Content --- */
        .container {
            text-align: center;
            z-index: 10;
            width: 100%;
            padding: 0 30px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s ease 0.8s;
        }
        body.loaded .container { opacity: 1; transform: translateY(0); }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 7vw, 4rem);
            font-weight: 700;
            letter-spacing: 10px;
            margin-bottom: 10px;
            /* Gradient สีน้ำฟ้า */
            background: linear-gradient(180deg, #fff 0%, var(--accent-color) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 212, 255, 0.4));
        }

        .subtext {
            font-family: 'Kanit', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: var(--accent-color);
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        .btn {
            position: relative;
            display: inline-flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 280px;
            height: 75px;
            text-decoration: none;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            backdrop-filter: blur(10px);
            cursor: pointer;
        }
        .btn:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: var(--accent-color);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 212, 255, 0.3);
        }
        .btn-text-main { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; letter-spacing: 3px; font-weight: 700; color: #fff; }
        .btn-text-sub { font-family: 'Kanit', sans-serif; font-size: 0.6rem; letter-spacing: 1px; color: rgba(255,255,255,0.5); margin-top: 5px; }

        /* --- Music Player --- */
        .music-player {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            background: rgba(2, 11, 26, 0.8);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: all 1s ease 1s;
        }
        body.loaded .music-player { opacity: 1; }

        .album-art {
            width: 50px; height: 50px; border-radius: 12px;
            overflow: hidden; border: 1px solid var(--glass-border);
        }
        .playing .album-art { animation: rotateArt 5s infinite linear; }
        @keyframes rotateArt { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .album-art img { width: 100%; height: 100%; object-fit: cover; }
        .player-controls-mini { flex-grow: 1; margin-left: 15px; overflow: hidden; }
        .music-title-mini {
            font-size: 0.6rem; color: #fff;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-bottom: 6px;
        }
        .ctrl-btns { display: flex; align-items: center; gap: 20px; }
        .play-btn { background: none; border: none; color: var(--accent-color); font-size: 0.9rem; cursor: pointer; transition: 0.3s; }

        footer {
            margin-top: 40px;
            font-size: 0.55rem;
            color: rgba(0, 212, 255, 0.4);
            letter-spacing: 2px;
            font-family: 'Orbitron', sans-serif;
        }

        #youtube-player { position: absolute; top: -1000px; left: -1000px; visibility: hidden; }

        @media (max-width: 480px) {
            h1 { letter-spacing: 5px; }
            .top-nav { width: 85%; }
        }
    </style>
</head>
<body>

    <div id="overlay" onclick="startWebsite()">
        <div class="enter-text-wrapper">
            <i class="fa-solid fa-droplet water-drop-icon"></i>
            <div class="main-enter-text">SONGKRAN 2026</div>
            <div class="sub-enter-text">HAPPY WATER FESTIVAL</div>
        </div>
    </div>

    <div class="bg-wrapper"></div>
    <div class="water-overlay"></div>

    <div class="top-nav">
        <a href="#" class="nav-logo">
            <img src="https://img2.pic.in.th/asdzx.png" alt="icon">
            DERNYOUNGSAY
        </a>
        <div class="nav-text">SONGKRAN V.2</div>
    </div>

    <div class="container">
        <h1>SONGKRAN</h1> 
        <div class="subtext">Sawatdee Pee Mai Thai - 2K26</div>

        <div class="button-group">
            <a href="https://dernyoungsay.github.io/gg/" class="btn">
                <span class="btn-text-main">MEMBER ENTER</span>
                <span class="btn-text-sub">เข้าสู่ระบบสมาชิก 2026</span>
            </a>
        </div>

        <footer>
            &copy; 2026 SONGKRAN FESTIVAL BY DERNYOUNGSAY
        </footer>
    </div>

    <div class="music-player" id="player-container">
        <div class="album-art">
            <img src="https://img.youtube.com/vi/Ovo1y7Pllt8/maxresdefault.jpg" alt="Cover" id="music-cover">
        </div>
        <div class="player-controls-mini">
            <div class="music-title-mini" id="music-title">Songkran Vibes...</div>
            <div class="ctrl-btns">
                <i class="fas fa-step-backward play-btn"></i>
                <button class="play-btn" id="master-play">
                    <i class="fas fa-play" id="play-icon"></i>
                </button>
                <i class="fas fa-step-forward play-btn"></i>
            </div>
        </div>
    </div>

    <div id="youtube-player"></div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        var videoId = 'Ovo1y7Pllt8'; 

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0', width: '0',
                videoId: videoId,
                playerVars: { 
                    'autoplay': 0, 
                    'loop': 1, 
                    'playlist': videoId,
                    'controls': 0,
                    'showinfo': 0,
                    'modestbranding': 1,
                    'iv_load_policy': 3
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function startWebsite() {
            document.body.classList.add('loaded');
            const overlay = document.getElementById('overlay');
            overlay.classList.add('fade-out');
            
            if (player && typeof player.playVideo === 'function') {
                player.unMute();
                player.setVolume(80);
                player.playVideo();
            }
        }

        function onPlayerReady(event) {
            updateTitle();
        }

        function updateTitle() {
            try {
                const videoData = player.getVideoData();
                if (videoData && videoData.title) {
                    document.getElementById('music-title').innerText = videoData.title;
                }
            } catch(e) {}
        }

        function onPlayerStateChange(event) {
            const icon = document.getElementById('play-icon');
            const cont = document.getElementById('player-container');
            
            if (event.data == YT.PlayerState.PLAYING) {
                icon.className = 'fas fa-pause';
                cont.classList.add('playing');
                updateTitle();
            } else {
                icon.className = 'fas fa-play';
                cont.classList.remove('playing');
            }
        }

        document.getElementById('master-play').addEventListener('click', function() {
            const state = player.getPlayerState();
            if (state == YT.PlayerState.PLAYING) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        });

        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>
</body>
</html>
